name: Tests

on:
  push:
  pull_request:
    branches:
      - main

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  bun-tests:
    name: Bun Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Bun dependencies
        run: bun install --frozen-lockfile

      - name: Run Bun tests
        run: bun test

  go-tests:
    name: Go Tests (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - models/agents
          - models/db
          - models/mcp
          - models/shared
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: models/go.work
          cache-dependency-path: |
            models/agents/go.sum
            models/db/go.sum
            models/mcp/go.sum
            models/shared/go.sum

      - name: Run Go tests
        working-directory: ${{ matrix.module }}
        run: go test ./...
